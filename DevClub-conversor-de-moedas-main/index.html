<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conversor de Moedas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

 

  <main>

    <label>Valor</label>
    <input class="input-value" type="number" placeholder="Digite o valor" />

    <label>Converter para</label>
    <select class="currency-select-2">
      <option value="Dolar">Dolar</option>
      <option value="Euro">Euro</option>
      <option value="Bitcoin">Bitcoin</option>
      <option value="Libra">Libra</option>
      <option value="Real">Real</option>
    </select>

    <button class="button">Converter</button>

    <section>

      <div class="caixa-brasil">
        <p class="p-moeda">Valor digitado</p>
        <p class="A-value">R$ 0,00</p>
      </div>



      <div class="caixa-eua">
        <p class="pp-moeda">Moeda convertida</p>
        <p class="B-value">0,00</p>
      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
